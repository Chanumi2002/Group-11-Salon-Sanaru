# Use H2 in-memory for tests (no MySQL required)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# Minimal OAuth2 client so SecurityConfig can create filterChain (no real login in tests)
spring.security.oauth2.client.registration.test.client-id=test-id
spring.security.oauth2.client.registration.test.client-secret=test-secret
spring.security.oauth2.client.registration.test.provider=google
spring.security.oauth2.client.provider.google.issuer-uri=https://accounts.google.com
