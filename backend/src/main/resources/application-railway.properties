spring.application.name=backend

# MySQL Database Configuration - Railway
# Spring Boot reads SPRING_DATASOURCE_* environment variables automatically
# These are set by the entrypoint.sh script from Railway's MYSQL* variables
# Only provide defaults if needed
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT Settings (change these in production!)
jwt.secret=${JWT_SECRET:SanaruSalonSecretKey2026SanaruSalonSecretKey2026SanaruSalonSecretKey2026}
jwt.expiration=${JWT_EXPIRATION:86400}

# Session and Cookie Configuration for OAuth2
server.servlet.session.cookie.same-site=none
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.http-only=true
server.servlet.session.tracking-modes=COOKIE

# Server Port
server.port=${PORT:8080}

# Admin Registration Secret
admin.registration.secret=${ADMIN_REGISTRATION_SECRET:AdminSecretKey2026}

# Email Configuration (Gmail SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=465
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.smtp.socketFactory.port=465
spring.mail.properties.mail.smtp.socketFactory.class=javax.net.ssl.SSLSocketFactory

# Email sender details
app.mail.from-email=${MAIL_USERNAME}
app.mail.from-name=Salon Sanaru
app.mail.support-email=${MAIL_SUPPORT_EMAIL:salonsanaru28@gmail.com}

# OAuth2 Configuration - Google
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.client-name=Google
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri=${GOOGLE_REDIRECT_URI}
spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
