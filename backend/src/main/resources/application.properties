spring.application.name=backend
server.port=${PORT:5000}

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400}

# Session / Cookie
server.servlet.session.cookie.same-site=none
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.http-only=true
server.servlet.session.tracking-modes=COOKIE

# Admin secret
admin.registration.secret=${ADMIN_REGISTRATION_SECRET}

# Mail
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:465}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.smtp.connectiontimeout=30000
spring.mail.properties.mail.smtp.timeout=30000
spring.mail.properties.mail.smtp.writetimeout=30000
spring.mail.properties.mail.debug=false

app.mail.from-email=${spring.mail.username}
app.mail.from-name=Salon Sanaru
app.mail.support-email=${MAIL_SUPPORT_EMAIL:${spring.mail.username}}

# Google OAuth2
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.client-name=Google
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri=${GOOGLE_REDIRECT_URI}
spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google.token-uri=https://www.googleapis.com/oauth2/v4/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v1/userinfo
spring.security.oauth2.client.provider.google.user-name-attribute=email

# Frontend redirect
oauth2.frontend-uri=${OAUTH2_FRONTEND_URI}

# Temporary local uploads only
upload.dir=${UPLOAD_DIR:./uploads}
spring.web.resources.static-locations=file:${upload.dir}/
spring.web.resources.cache.period=3600

# Multipart
spring.servlet.multipart.max-file-size=1MB
spring.servlet.multipart.max-request-size=2MB
app.service.image.max-size-bytes=1048576

# PayHere
payhere.merchant-id=${PAYHERE_MERCHANT_ID}
payhere.merchant-secret=${PAYHERE_MERCHANT_SECRET}
payhere.checkout-url=${PAYHERE_CHECKOUT_URL:https://sandbox.payhere.lk/pay/checkout}
payhere.currency=${PAYHERE_CURRENCY:LKR}
payhere.return-url=${PAYHERE_RETURN_URL}
payhere.cancel-url=${PAYHERE_CANCEL_URL}
payhere.notify-url=${PAYHERE_NOTIFY_URL}

# Groq
groq.api.url=${GROQ_API_URL:}
groq.api.key=${GROQ_API_KEY:}
groq.api.model=${GROQ_API_MODEL:llama-3.3-70b-versatile}

# Health Check
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
